<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OJT HOURS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="theme-morning">
<nav class="top-navbar navbar mb-3">
  <div class="container-fluid px-0 d-flex align-items-center gap-2 overflow-hidden">
    <div class="d-flex align-items-center gap-2 flex-nowrap overflow-auto w-100 pb-1" id="navForecastRow" style="scrollbar-width:none">
      <div class="forecast-circle" style="min-width:62px;opacity:.5"><span style="font-size:.6rem">Loading...</span></div>
    </div>
    <div class="ms-auto text-end flex-shrink-0" style="min-width:110px">
      <div style="font-size:.78rem;font-weight:700" id="navWeatherSummary"><span class="spinner-border spinner-sm"></span></div>
      <div style="font-size:.62rem;opacity:.7" id="navCity">—</div>
      <div style="font-size:.58rem;opacity:.55" id="navDate">—</div>
    </div>
  </div>
</nav>

<div class="container-fluid px-3 px-sm-4">
  <div class="row g-4">

    <div class="col-12 col-md-6 col-lg-5 col-xl-5">
      <div class="card main-card p-3 p-lg-4 h-100">

        <div class="mb-3">
          <div style="font-size:.75rem;font-weight:700;letter-spacing:4px;text-transform:uppercase;opacity:.55;margin-bottom:4px" id="clockDay">MONDAY</div>
          <div style="font-size:2.6rem;font-weight:800;letter-spacing:-1px;line-height:1" id="clockTime">10:10 AM</div>
          <div style="font-size:1.3rem;font-weight:600;opacity:.75" id="clockDate">01/01/2026</div>
        </div>

        <hr style="opacity:.15">

        <div class="card inner-card p-3 mb-3">
          <div style="font-size:.7rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;opacity:.55;margin-bottom:10px">Pick Start Date and Hours</div>
          <div class="row g-2">
            <div class="col-12 col-sm-6">
              <label class="form-label fw-semibold" style="font-size:.78rem">Start Date</label>
              <input type="date" class="form-control form-control-sm" id="startDate" style="border-radius:10px;border:1.5px solid rgba(0,0,0,.1);font-weight:500">
            </div>
            <div class="col-12 col-sm-6">
              <label class="form-label fw-semibold" style="font-size:.78rem">Required OJT Hours</label>
              <input type="number" class="form-control form-control-sm" id="ojtHours" placeholder="e.g. 300" min="1" style="border-radius:10px;border:1.5px solid rgba(0,0,0,.1);font-weight:500">
            </div>
            <div class="col-12 col-sm-4">
              <label class="form-label fw-semibold" style="font-size:.78rem">Hrs / Day</label>
              <input type="number" class="form-control form-control-sm" id="hrsPerDay" value="8" min="1" max="24" style="border-radius:10px;border:1.5px solid rgba(0,0,0,.1);font-weight:500">
            </div>
            <div class="col-12 col-sm-4">
              <label class="form-label fw-semibold" style="font-size:.78rem">Absences (days)</label>
              <input type="number" class="form-control form-control-sm" id="absences" value="0" min="0" style="border-radius:10px;border:1.5px solid rgba(0,0,0,.1);font-weight:500">
            </div>
            <div class="col-12 col-sm-4">
              <label class="form-label fw-semibold" style="font-size:.78rem">Half Days</label>
              <input type="number" class="form-control form-control-sm" id="halfdays" value="0" min="0" style="border-radius:10px;border:1.5px solid rgba(0,0,0,.1);font-weight:500">
            </div>
          </div>
          <div class="text-end mt-3">
            <button class="btn btn-calc" onclick="calculateOJT()"><i class="bi bi-calculator me-1"></i>Calculate</button>
          </div>
        </div>

        <div class="result-panel" id="resultPanel">
          <div style="font-size:.7rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;opacity:.55;margin-bottom:6px">Result of Calculation</div>
          <div id="resultContent" style="font-size:.82rem;opacity:.6">Fill in the form and press <strong>Calculate</strong></div>
        </div>

      </div>
    </div>

    <div class="col-12 col-md-6 col-lg-7 col-xl-7">
      <div class="card main-card p-3 p-lg-4 h-100">

        <div class="row g-2 align-items-end mb-3">
          <div class="col-8 col-lg-7">
            <label class="form-label fw-semibold mb-1" style="font-size:.78rem"><i class="bi bi-geo-alt-fill me-1"></i>Location — Philippines</label>
            <select class="form-select form-select-sm" id="citySelect" onchange="fetchWeather()" style="border-radius:10px;border:1.5px solid rgba(0,0,0,.1);font-weight:500">
              <option value="14.5995,120.9842">Manila</option>
              <option value="10.3157,123.8854">Cebu City</option>
              <option value="7.0707,125.4123">Davao City</option>
              <option value="10.7202,122.5621">Iloilo City</option>
              <option value="14.0794,121.1444" selected>Calamba, Laguna</option>
              <option value="16.4023,120.5960">Baguio City</option>
              <option value="13.9411,121.1644">Lucena City</option>
              <option value="15.1800,120.5700">San Fernando, Pampanga</option>
              <option value="8.9475,125.5406">Butuan City</option>
              <option value="6.1164,125.1716">General Santos City</option>
              <option value="11.2444,125.0039">Tacloban City</option>
              <option value="13.6218,123.1948">Naga City</option>
              <option value="14.8527,120.8110">Malolos, Bulacan</option>
              <option value="14.3294,121.0753">Muntinlupa</option>
              <option value="14.4791,121.0198">Las Piñas</option>
              <option value="14.6760,121.0437">Quezon City</option>
              <option value="14.5547,121.0244">Makati</option>
              <option value="14.3500,121.4000">Tayabas, Quezon</option>
              <option value="9.7577,118.7350">Puerto Princesa</option>
              <option value="12.8797,121.7740">Calapan, Oriental Mindoro</option>
            </select>
          </div>
          <div class="col-4 col-lg-5 text-end">
            <button class="btn btn-sm fw-semibold" onclick="fetchWeather()" style="border-radius:10px;border:1.5px solid rgba(0,0,0,.15);font-size:.78rem;padding:6px 14px"><i class="bi bi-arrow-clockwise me-1"></i>Refresh</button>
          </div>
        </div>

        <div class="weather-card wc-default mb-3" id="weatherCard">
          <div class="rain-overlay" id="rainOverlay"></div>
          <div class="sun-overlay" id="sunOverlay" style="display:none">
            <svg class="sun-rays" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
              <g stroke="#fff" stroke-width="3" stroke-linecap="round">
                <line x1="50" y1="5" x2="50" y2="20"/><line x1="50" y1="80" x2="50" y2="95"/>
                <line x1="5" y1="50" x2="20" y2="50"/><line x1="80" y1="50" x2="95" y2="50"/>
                <line x1="18" y1="18" x2="28" y2="28"/><line x1="72" y1="72" x2="82" y2="82"/>
                <line x1="82" y1="18" x2="72" y2="28"/><line x1="18" y1="82" x2="28" y2="72"/>
              </g>
            </svg>
          </div>
          <div class="cloud-overlay" id="cloudOverlay" style="display:none">☁️</div>
          <div id="weatherBody" style="position:relative;z-index:2">
            <span class="spinner-border spinner-sm me-1"></span>
            <span style="font-size:.85rem">Loading weather data...</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
